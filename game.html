<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Matematika Anjar</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#4facfe,#00f2fe);color:white;text-align:center;}
.container{max-width:420px;margin:20px auto;background:rgba(0,0,0,0.3);padding:20px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,0.4);transition:0.3s;}
.container:hover{transform:scale(1.02);}
input,textarea{width:90%;padding:12px;margin:5px 0;border-radius:15px;border:none;font-size:16px;outline:none;box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);}
textarea{resize:none;height:60px;}
button{padding:12px 15px;margin:5px;border:none;border-radius:15px;background:linear-gradient(145deg,#7477bb,#f5f3f3);font-weight:bold;font-size:16px;cursor:pointer;transition:0.2s;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
button:hover{transform:scale(1.05);background:#ffe082;}
.hidden{display:none;}
#jawaban{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
#jawaban button{padding:18px;font-size:20px;border-radius:15px;background:linear-gradient(145deg,#ffffff,#06f957);box-shadow:0 4px 10px rgba(0,0,0,0.3);}
#jawaban button:hover{transform:scale(1.05);background:#ffe082;}
#leaderboard,#adminPanel{background:white;color:black;padding:10px;border-radius:10px;max-height:200px;overflow:auto;text-align:left;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
#pvpBoard{display:flex;justify-content:space-between;gap:10px;margin-top:10px;}
.pvpCol{flex:1;background:rgba(255,255,255,0.8);color:black;padding:10px;border-radius:15px;}
.pvpCol h3{margin:5px 0;}
canvas{background:white;border-radius:10px;margin-top:10px;}

.menuGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.menuGrid button{
  width:100%;

  .menuGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:15px;
}

.menuGrid button{
  width:100%;
  padding:14px;
  font-size:15px;
  border-radius:12px;
}

/* Supaya tombol sejajar tinggi */
.menuGrid button{
  display:flex;
  justify-content:center;
  align-items:center;
  height:55px;
}

.menuGrid button:hover{
  transform:scale(1.05);
  transition:0.2s;
}
}
</style>
</head>
<body>

<!-- WELCOME PAGE SEBELUM PAGE 0 -->
<div id="welcomePage" class="container">
  <h2>🎉 Selamat Datang di Game Matematika</h2>
  <p>💡 Pencipta: <strong>Anjar</strong></p>
  <p style="color:yellow;">⚠️ Game ini masih dalam tahap uji coba.<br></p>
  <button id="lanjutKeStart">▶️ Lanjut</button>
  <button id="keluar">❌ Keluar</button>
</div>

<!-- START PAGE (Page 0) -->
<div id="startPage" class="container hidden">
  <h2>🎮 Game Matematika</h2>
  <input id="nama" placeholder="Nama">
  <textarea id="komentar" placeholder="Komentar..."></textarea>
  <button id="kirimKomentar">💬 Kirim</button>
  <br>
  <button id="main">▶️ Main Solo</button>
  <button id="pvpBtn">⚔️ PvP</button>
  <button id="adminBtn">👑 Admin</button>
  <button id="kembaliWelcome">⬅️ Kembali</button>
</div>

<!-- LOGIN ADMIN -->
<div id="loginAdminPage" class="container hidden">
  <h2>🔐 Login Admin</h2>
  <input id="adminPass" type="password" placeholder="Masukkan password admin">
  <button id="loginAdminBtn">Masuk</button>
  <button id="kembaliStartFromAdmin">🏠 Kembali</button>
</div>

<!-- SOLO / PvP GAME PAGE -->
<div id="gamePage" class="container hidden">
  <h3 id="rank"></h3>
  <h3 id="level"></h3>
  <h2 id="soal"></h2>
  <div id="jawaban"></div>
  <p>⏱️ <span id="waktu">30</span></p>
  <h3 id="skor">Skor: 0</h3>
  <h3 id="skorLawan"></h3>
  <button id="mulaiUlang">🔄 Mulai Ulang Soal</button>
  <h3>🌐 Leaderboard</h3>
  <div id="leaderboard"></div>
  <button id="kembaliStart">🏠 Kembali</button>
</div>

<!-- PvP ROOM PAGE -->
<div id="pvpPage" class="container hidden">
  <h2>⚔️ PvP</h2>
  <button id="buatRoom">🆕 Buat Room</button>
  <input id="kodeRoom" placeholder="Masukkan Kode Room">
  <button id="gabungRoom">🔗 Gabung Room</button>
  <p id="infoRoom"></p>
  <button id="kembaliStartPvP">🏠 Kembali</button>
</div>

<!-- ADMIN PAGE -->
<div id="adminPage" class="container hidden">
  <h2>👑 Admin Panel</h2>
  <div id="adminPanel"></div>
  <canvas id="chart"></canvas>
  <button id="kembaliStartAdmin">🏠 Kembali</button>
</div>

<!-- HASIL PAGE -->
<div id="hasilPage" class="container hidden">
  <h2>🏆 Skor Kamu</h2>
  <h3 id="skorAkhir"></h3>
  <button id="mainLagi">▶️ Main Lagi</button>
</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyBqC5EJNNG2uOeCcjOSzJxaheWN6bzMHmc",
  authDomain: "game-16ffc.firebaseapp.com",
  projectId: "game-16ffc",
  storageBucket: "game-16ffc.firebasestorage.app",
  messagingSenderId: "796216243105",
  appId: "1:796216243105:web:28b7414951fc178fb551e0",
  measurementId: "G-3748145W49"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 AKTIFKAN OFFLINE (BIAR PERMANEN)
firebase.firestore().enablePersistence()
.catch((err)=>console.log("Persistence error:",err));

// ================= VAR =================
const welcomePage=document.getElementById("welcomePage");
const startPage=document.getElementById("startPage");
const loginAdminPage=document.getElementById("loginAdminPage");
const gamePage=document.getElementById("gamePage");
const pvpPage=document.getElementById("pvpPage");
const adminPage=document.getElementById("adminPage");
const hasilPage=document.getElementById("hasilPage");
const namaInput=document.getElementById("nama");
const komentar=document.getElementById("komentar");
const jawabanEl=document.getElementById("jawaban");
const soalEl=document.getElementById("soal");
const skorEl=document.getElementById("skor");
const levelEl=document.getElementById("level");
const rankEl=document.getElementById("rank");
const leaderboardEl=document.getElementById("leaderboard");
const skorLawanEl=document.getElementById("skorLawan");

let skor=0,nomor=1,waktu=30,timer,jawabanBenar;
let currentRoomId=null,isPlayer2=false;

// ================= SIMPAN NAMA =================
window.onload = () => {
  const savedNama = localStorage.getItem("nama");
  if(savedNama) namaInput.value = savedNama;
};

// ================= NAVIGASI =================
document.getElementById("lanjutKeStart").onclick = () => showPage("startPage");
document.getElementById("keluar").onclick = () => window.close();

document.getElementById("main").onclick=()=>{
  if(!namaInput.value)return alert("Isi nama!");
  localStorage.setItem("nama",namaInput.value);
  skorLawanEl.innerText="";
  showPage("gamePage","solo");
};

document.getElementById("pvpBtn").onclick=()=>showPage("pvpPage");
document.getElementById("adminBtn").onclick=()=>showPage("loginAdminPage");
document.getElementById("kembaliStart").onclick=()=>{showPage("startPage"); clearInterval(timer);};
document.getElementById("kembaliStartPvP").onclick=()=>showPage("startPage");
document.getElementById("kembaliStartAdmin").onclick=()=>showPage("startPage");
document.getElementById("kembaliStartFromAdmin").onclick =()=>showPage("startPage");
document.getElementById("mainLagi").onclick=()=>showPage("startPage");
document.getElementById("kembaliWelcome").onclick = () => showPage("welcomePage");

// ================= KOMENTAR =================
document.getElementById("kirimKomentar").onclick=()=>{
  if(!namaInput.value||!komentar.value)return alert("Isi dulu!");
  db.collection("komentar").add({
    nama:namaInput.value,
    isi:komentar.value,
    time:Date.now()
  });
  komentar.value="";
  alert("Terkirim!");
};

// ================= GAME =================
document.getElementById("mulaiUlang").onclick=()=>{
  waktu=30; nomor=1;
  mulaiTimer(); buatSoal();
};

function showPage(page,mode=null){
  welcomePage.classList.add("hidden");
  startPage.classList.add("hidden");
  loginAdminPage.classList.add("hidden");
  gamePage.classList.add("hidden");
  pvpPage.classList.add("hidden");
  adminPage.classList.add("hidden");
  hasilPage.classList.add("hidden");

  document.getElementById(page).classList.remove("hidden");

  if(page==="gamePage" && mode==="solo"){
    skor=0; nomor=1; waktu=30;
    mulai();
  }
}

function mulai(){mulaiTimer(); buatSoal(); loadLeaderboard();}
function mulaiTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    waktu--;
    document.getElementById("waktu").innerText=waktu;
    if(waktu<=0){clearInterval(timer); selesai();}
  },1000);
}

function getLevel(){return Math.floor((nomor-1)/5)+1;}
function getRank(s){
  if(s<5)return"🥉 Bronze";
  if(s<10)return"🥈 Silver";
  if(s<20)return"🥇 Gold";
  return"🔥 Master";
}

function buatSoal(){
  let level=getLevel();
  levelEl.innerText="Level "+level;

  let max=10+level*10;
  let a=Math.floor(Math.random()*max)+1;
  let b=Math.floor(Math.random()*max)+1;

  let tipe=Math.floor(Math.random()*4);
  if(level<=2) tipe=Math.floor(Math.random()*2);
  else if(level<=4) tipe=Math.floor(Math.random()*3);

  let soal,jaw;

  if(tipe===0){soal=`${a}+${b}`; jaw=a+b;}
  else if(tipe===1){soal=`${a}-${b}`; jaw=a-b;}
  else if(tipe===2){soal=`${a}×${b}`; jaw=a*b;}
  else{soal=`${a*b}÷${b}`; jaw=a;}

  if(level>=7){soal=`(${a}+${b})×2`; jaw=(a+b)*2;}

  jawabanBenar=jaw;
  soalEl.innerText=soal;
  tampilJawaban();
}

function tampilJawaban(){
  jawabanEl.innerHTML="";
  let pilihan=[jawabanBenar];

  while(pilihan.length<4){
    let salah=jawabanBenar+Math.floor(Math.random()*10-5);
    if(!pilihan.includes(salah)) pilihan.push(salah);
  }

  pilihan.sort(()=>Math.random()-0.5);

  pilihan.forEach(n=>{
    const btn=document.createElement("button");
    btn.innerText=n;

    btn.onclick=()=>{
      if(n===jawabanBenar) skor++;

      skorEl.innerText="Skor: "+skor;
      rankEl.innerText=getRank(skor);

      if(currentRoomId){
        const field=isPlayer2?"skor2":"skor1";
        db.collection("rooms").doc(currentRoomId)
          .update({[field]:firebase.firestore.FieldValue.increment(1)});
      }

      setTimeout(()=>{nomor++; buatSoal();},300);
    };

    jawabanEl.appendChild(btn);
  });
}

// ================= LEADERBOARD =================
function loadLeaderboard(){
  db.collection("scores")
    .orderBy("skor","desc")
    .limit(10)
    .onSnapshot(s=>{
      let html="";
      s.forEach(doc=>{
        const d=doc.data();
        html+=`${d.nama} - ${d.skor}<br>`;
      });
      leaderboardEl.innerHTML=html;
    });
}

// ================= SELESAI =================
function selesai(){
  clearInterval(timer);

  db.collection("scores").add({
    nama:namaInput.value,
    skor:skor,
    time:Date.now()
  });

  document.getElementById("skorAkhir").innerText="🎯 Skor: "+skor;
  showPage("hasilPage");
}

// ================= ADMIN (FIX PERMANEN) =================
const ADMIN_PASSWORD = "admin123";

document.getElementById("loginAdminBtn").onclick = () => {
  const pw = document.getElementById("adminPass").value;

  if(pw === ADMIN_PASSWORD){
    showPage("adminPage");
    loadAdmin();
    document.getElementById("adminPass").value="";
  } else alert("Password salah!");
};

function loadAdmin(){

  const adminPanel = document.getElementById("adminPanel");

  let komentarData = [];
  let skorData = [];

  // KOMENTAR
  db.collection("komentar")
    .orderBy("time","desc")
    .onSnapshot(snap=>{
      komentarData=[];
      snap.forEach(doc=>komentarData.push(doc.data()));
      render();
    });

  // SKOR
  db.collection("scores")
    .orderBy("skor","desc")
    .onSnapshot(snap=>{
      skorData=[];
      snap.forEach(doc=>skorData.push(doc.data()));
      render();
    });

  function render(){
    let html="<h4>💬 Komentar</h4>";

    komentarData.forEach(d=>{
      html+=`<div>👤 ${d.nama}: ${d.isi}</div>`;
    });

    html+="<hr><h4>🏆 Skor</h4>";

    let label=[],data=[];

    skorData.forEach(d=>{
      html+=`<div>${d.nama} - ${d.skor}</div>`;
      label.push(d.nama);
      data.push(d.skor);
    });

    adminPanel.innerHTML=html;

    if(window.chart) window.chart.destroy();

    window.chart=new Chart(document.getElementById("chart"),{
      type:"bar",
      data:{
        labels:label,
        datasets:[{label:"Skor",data:data}]
      }
    });
  }
}

// ================= INIT =================
showPage("welcomePage");
</script>
</body>
</html>
