input,textarea{width:90%;padding:12px;margin:5px 0;border-radius:15px;border:none;font-size:16px;outline:none;box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);}

canvas{background:white;border-radius:10px;margin-top:10px;}

.menuGrid{

// ================= SIMPAN NAMA =================
window.onload = () => {

// ================= KOMENTAR =================
document.getElementById("kirimKomentar").onclick=()=>{
  if(!namaInput.value||!komentar.value)return alert("Isi dulu!");
  db.collection("komentar").add({

document.getElementById("mulaiUlang").onclick=()=>{
  waktu=30; nomor=1;

function showPage(page,mode=null){
  welcomePage.classList.add("hidden");
  startPage.classList.add("hidden");
  loginAdminPage.classList.add("hidden");
  gamePage.classList.add("hidden");
  pvpPage.classList.add("hidden");
  adminPage.classList.add("hidden");
  hasilPage.classList.add("hidden");

  document.getElementById(page).classList.remove("hidden");

  if(page==="gamePage" && mode==="solo"){
    skor=0; nomor=1; waktu=30;
    mulai();
  }
}

function mulai(){mulaiTimer(); buatSoal(); loadLeaderboard();}
function mulaiTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    waktu--;
    document.getElementById("waktu").innerText=waktu;
    if(waktu<=0){clearInterval(timer); selesai();}
  },1000);
}

function getLevel(){return Math.floor((nomor-1)/5)+1;}
function getRank(s){
  if(s<5)return"🥉 Bronze";
  if(s<10)return"🥈 Silver";
  if(s<20)return"🥇 Gold";
  return"🔥 Master";
}

function buatSoal(){
  let level=getLevel();
  levelEl.innerText="Level "+level;

  let max=10+level*10;
  let a=Math.floor(Math.random()*max)+1;
  let b=Math.floor(Math.random()*max)+1;

  let tipe=Math.floor(Math.random()*4);
  if(level<=2) tipe=Math.floor(Math.random()*2);
  else if(level<=4) tipe=Math.floor(Math.random()*3);

  let soal,jaw;

  if(tipe===0){soal=`${a}+${b}`; jaw=a+b;}
  else if(tipe===1){soal=`${a}-${b}`; jaw=a-b;}
  else if(tipe===2){soal=`${a}×${b}`; jaw=a*b;}
  else{soal=`${a*b}÷${b}`; jaw=a;}

  if(level>=7){soal=`(${a}+${b})×2`; jaw=(a+b)*2;}

  jawabanBenar=jaw;
  soalEl.innerText=soal;
  tampilJawaban();
}

function tampilJawaban(){
  jawabanEl.innerHTML="";
  let pilihan=[jawabanBenar];

  while(pilihan.length<4){
    let salah=jawabanBenar+Math.floor(Math.random()*10-5);
    if(!pilihan.includes(salah)) pilihan.push(salah);
  }

  pilihan.sort(()=>Math.random()-0.5);

  pilihan.forEach(n=>{
    const btn=document.createElement("button");
    btn.innerText=n;

    btn.onclick=()=>{
      if(n===jawabanBenar){
  skor++;
  updateSkorRealtime(); // 🔥 TAMBAH INI
}

      skorEl.innerText="Skor: "+skor;
      rankEl.innerText=getRank(skor);

      if(currentRoomId){
        const field=isPlayer2?"skor2":"skor1";
        db.collection("rooms").doc(currentRoomId)
          .update({[field]:firebase.firestore.FieldValue.increment(1)});
      }

      setTimeout(()=>{nomor++; buatSoal();},300);
    };

    jawabanEl.appendChild(btn);
  });
}

// ================= LEADERBOARD =================
// ================= LEADERBOARD =================
function loadLeaderboard(){
  db.collection("scores")
    .orderBy("skor","desc")
    .limit(10)
    .onSnapshot(snapshot=>{

      let html = "";
      let rank = 1;

      snapshot.forEach(doc=>{
        const d = doc.data();

        html += `
          <div class="leaderItem">
            ${rank}. 🏆 ${d.nama}
            <br>
            ⭐ ${d.skor} | 🎮 Lv ${d.level || 1}
          </div>
        `;

        rank++;
      });

      leaderboardEl.innerHTML = html || "Belum ada data";
    });
}

// ================= SELESAI =================
function selesai(){
  clearInterval(timer);

  const nama = namaInput.value.trim();

  if(!nama){
    alert("Nama wajib diisi!");
    return;
  }

  const userId = nama.toLowerCase();
  const ref = db.collection("scores").doc(userId);

  const levelAkhir = getLevel(); // 🔥 TAMBAH INI

  ref.get().then(doc=>{
    if(!doc.exists){
      ref.set({
        nama: nama,
        skor: skor,
        level: levelAkhir, // 🔥 SIMPAN LEVEL
        totalGame: 1,
        time: firebase.firestore.FieldValue.serverTimestamp()
      });
    }else{
      const data = doc.data();

      ref.update({
        totalGame: firebase.firestore.FieldValue.increment(1),
        skor: skor > data.skor ? skor : data.skor,
        level: levelAkhir > (data.level || 1) ? levelAkhir : data.level, // 🔥 UPDATE LEVEL
        time: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  });

  document.getElementById("skorAkhir").innerText = "🎯 Skor: " + skor;
  showPage("hasilPage");
}
  document.getElementById("skorAkhir").innerText = "🎯 Skor: " + skor;
  showPage("hasilPage");



// ================= ADMIN (FIX PERMANEN) =================

    loadAdmin();
    document.getElementById("adminPass").value="";

}

  function render(){
    let html="<h4>💬 Komentar</h4>";

    komentarData.forEach(d=>{
      html+=`<div>👤 ${d.nama}: ${d.isi}</div>`;
    });

function selesaiPvP(data){
  const nama = namaInput.value.trim();

  const skorKamu = isPlayer2 ? data.skor2 : data.skor1;
  const skorLawan = isPlayer2 ? data.skor1 : data.skor2;

  const hasil =
    skorKamu > skorLawan ? "MENANG 🏆" :
    skorKamu < skorLawan ? "KALAH ❌" :
    "SERI 🤝";

  // 🔥 INI YANG AKAN MEMBUAT pvp_history
  db.collection("pvp_history").add({
    nama: nama,
    lawan: isPlayer2 ? data.player1 : data.player2,
    skorKamu: skorKamu,
    skorLawan: skorLawan,
    hasil: hasil,
    waktu: new Date().toLocaleString(),
    timestamp: Date.now()
  });

  alert("Hasil: " + hasil);
}

  if(!doc.exists) return alert("Room tidak ada!");

  await ref.update({
    player2: nama,
    started: true
  });

  currentRoomId = kode;
  isPlayer2 = true;

  currentRoomId = roomRef.id;
listenRoom(); // WAJIB

};
function listenRoom(){
  db.collection("rooms").doc(currentRoomId)
    .onSnapshot(doc=>{
      const data = doc.data();
      if(!data) return;

      document.getElementById("infoRoom").innerText =
        data.player1 + " vs " + (data.player2 || "...");

      // update skor
      skorEl.innerText = "Skor: " +
        (isPlayer2 ? data.skor2 : data.skor1);

      skorLawanEl.innerText = "Lawan: " +
        (isPlayer2 ? data.skor1 : data.skor2);

      // 🔥 START GAME kalau sudah 2 player
      if(data.started && data.soal === ""){
        generateSoalPvP();
      }

      // 🔥 tampilkan soal ke semua player
      if(data.soal){
        soalEl.innerText = data.soal;
        jawabanBenar = data.jawaban;
        tampilJawabanPvP();
        showPage("gamePage");
      }
    });
}
function generateSoalPvP(){
  let a = Math.floor(Math.random()*20)+1;
  let b = Math.floor(Math.random()*20)+1;

  let soal = `${a}+${b}`;
  let jawaban = a + b;

  db.collection("rooms").doc(currentRoomId).update({
    soal: soal,
    jawaban: jawaban
  });
}

function tampilJawabanPvP(){
  jawabanEl.innerHTML="";
  let pilihan=[jawabanBenar];

  while(pilihan.length<4){
    let salah = jawabanBenar + Math.floor(Math.random()*10-5);
    if(!pilihan.includes(salah)) pilihan.push(salah);

    
  }

  pilihan.sort(()=>Math.random()-0.5);

  pilihan.forEach(n=>{
    const btn=document.createElement("button");
    btn.innerText=n;

    btn.onclick=()=>{

      if(n === jawabanBenar){
        const field = isPlayer2 ? "skor2" : "skor1";

        db.collection("rooms").doc(currentRoomId)
          .update({
            [field]: firebase.firestore.FieldValue.increment(1)
          });
      }

      // 🔥 soal baru untuk semua player
      generateSoalPvP();
    };

    jawabanEl.appendChild(btn);
  });
}

function generateKodeRoom(){
  return Math.floor(100000 + Math.random() * 900000).toString();
}

function updateSkorRealtime(){
  const nama = namaInput.value.trim();
  if(!nama) return;

  const userId = nama.toLowerCase();
  const ref = db.collection("scores").doc(userId);

  ref.set({
    nama: nama,
    skor: skor,
    level: getLevel(),
    time: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });

  
}


// ================= INIT =================
showPage("welcomePage");
</script>
